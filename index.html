<!DOCTYPE HTML>
<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>
    Hopkins TImer
  </title>

  <link rel="icon" type="image/x-icon"
    href="https://raw.githubusercontent.com/HopkinsTimer/HopkinsTimer.github.io/main/hopkins-150x151.png">
  <p>
  </p>
  <style>
    p {
      text-align: center;
      font-size: 60px;
      margin-top: 0px;
    }
  </style>
</head>

<body>

  <!-- Display the countdown timer in an element -->
  <p id="demo"></p>
  <audio autoplay loop>
    <source src="https://github.com/HopkinsTimer/HopkinsTimer.github.io/blob/main/undertale.mp3?raw=true"
      type="audio/mpeg">
    Your browser does not support the audio element.
  </audio>
  <script>
    // Set the date we're counting down to
    var holidays = ['9/2/2024', '11/11/2024', '11/25/2024', '11/26/2024', '11/27/2024', '11/28/2024', '11/29/2024', '12/23/2024', '12/24/2024', '12/25/2024', '12/26/2024', '12/27/2024', '12/30/2024', '12/31/2024', '1/1/2025', '1/2/2025', '1/3/2025', '1/20/2025', '2/17/2025', '4/18/2025', '4/21/2025', '4/22/2025', '4/23/2025', '4/24/2025', '4/25/2025', '5/26/2025']
    var winter_break = ['12/23/2024', '12/24/2024', '12/25/2024', '12/26/2024', '12/27/2024', '12/30/2024', '12/31/2024', '1/1/2025', '1/2/2025', '1/3/2025', '1/4/2025', '1/5/2025']
    var thanksgiving_break = ['11/25/2024', '11/26/2024', '11/27/2024', '11/28/2024', '11/29/2024', '11/30/2024', '12/1/2024']
    var spring_break = ['4/18/2025', '14/19/2024', '14/20/2024', '4/21/2025', '4/22/2025', '4/23/2025', '4/24/2025', '4/25/2025']
    var minimumDays = ['8/30/2024', '10/22/2024', '10/23/2024', '10/24/2024', '11/22/2024', '4/17/2024']
    var firstDay = '8/14/2024'
    var finalExams = ['12/18/2024', '12/19/2024', '12/20/2024', '5/28/2025', '5/29/2025', '5/30/2025']
    var miscellaneous = ['9/2/2024', '11/11/2024', '1/20/2025', '2/17/2025', '5/26/2025']

    function getBusinessDatesCount(startDate, endDate) {
      let count = 0;
      const curDate = new Date(startDate.getTime());
      while (curDate <= endDate) {
        const dayOfWeek = curDate.getDay();
        const _day = curDate.toLocaleDateString()
        if (dayOfWeek !== 0 && dayOfWeek !== 6 && !(holidays.includes(_day)) && !(minimumDays.includes(_day)) && firstDay != _day && !(finalExams.includes(_day)) && dayOfWeek !== 4) count++;
        curDate.setDate(curDate.getDate() + 1);
      }
      return count;
    }

    function getThursdayCount(startDate, endDate) {
      let count = 0;
      const curDate = new Date(startDate.getTime());
      while (curDate <= endDate) {
        const dayOfWeek = curDate.getDay();
        if (dayOfWeek === 4) count++;
        curDate.setDate(curDate.getDate() + 1);
      }
      return count;
    }

    function getShorterDates(startDate, endDate) {
      let count = 0;
      const curDate = new Date(startDate.getTime());
      const _day = curDate.toLocaleDateString()
      while (curDate <= endDate) {
        const dayOfWeek = curDate.getDay();
        if (minimumDays.includes(_day) || finalExams.includes(_day)) count++;
        curDate.setDate(curDate.getDate() + 1);
      }
      return count;
    }

    // Update the count down every 1 second
    var isWeekend = false;
    var notSchoolHours = false;
    var total_ms = 4356300000;
    var start_date = new Date('August 14, 2024 08:15:00')
    var today = new Date();
    var _today = today.toLocaleDateString();
    if (winter_break.includes(_today)) {
      var isWeekend = true;
      today = new Date('December 20, 2024 05:00:00')
    }

    if (thanksgiving_break.includes(_today)) {
      var isWeekend = true;
      today = new Date('November 22, 2024 05:00:00')
    }

    if (miscellaneous.includes(_today)) {
      var isWeekend = true;
      today.setDate(today.getDate() - 3);
    }
    
    if (today.getDay() == 0) {
      var isWeekend = true;
      today.setDate(today.getDate() - 2);
    }
    else if (today.getDay() == 6) {
      var isWeekend = true;
      today.setDate(today.getDate() - 1);
    }
    today.setHours(8, 15, 0);
    var daysElapsed = getBusinessDatesCount(start_date, today)
    var thursdayCount = getThursdayCount(start_date, today)
    var shorterDatesCount = getShorterDates(start_date, today)
    total_ms -= 24540000 * daysElapsed;
    total_ms -= 24300000 * thursdayCount;
    total_ms -= 17400000 * shorterDatesCount;
    if (today.toLocaleDateString() !== firstDay) {
      total_ms -= 17700000;
    }


    var now = new Date();
    if (now.getHours > 8 && now.getHours < 16) {
      if (!(now.getHours == 8 && now.getMinutes > 14)) {
        notSchoolHours = true
      }
      if (!(now.getHours == 15 && now.getMinutes < 30)) {
        notSchoolHours = true
      }
    }
    else {
      notSchoolHours = true
    }
    if (notSchoolHours == true) {
      now.setHours(15, 19, 0)
    }
    var timeElapsed = now.getTime() - today.getTime();
    total_ms -= timeElapsed;
    var x = setInterval(function () {
      if (!(isWeekend) && !(notSchoolHours)) {
        total_ms -= 1000;
      }
      days = Math.floor(total_ms / (1000 * 60 * 60 * 24));
      hours = Math.floor((total_ms % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60))
      minutes = Math.floor((total_ms % (1000 * 60 * 60)) / (1000 * 60));
      seconds = Math.floor((total_ms % (1000 * 60)) / 1000);
      document.getElementById("demo").innerHTML = days + "d " + hours + "h "
        + minutes + "m " + seconds + "s ";

    }, 1000);
  </script>
</body>

</html>
